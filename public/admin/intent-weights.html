<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chaupaal · Intent weights</title>
  <style>
    :root { --ink:#2B2730; --cream:#FFF8F0; --red:#E63946; --line:#E8DFD4; --muted:#7A7280; --navy:#1B1F3B; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, Segoe UI, sans-serif; background:var(--cream); color:var(--ink); }
    header { background:var(--navy); color:#fff; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    h1 { font-size:18px; margin:0; }
    main { max-width:960px; margin:0 auto; padding:20px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:16px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
    button { border:none; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; background:var(--red); color:#fff; }
    button.secondary { background:transparent; color:var(--ink); border:1px solid var(--line); }
    .meta { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .err { color:var(--red); font-weight:600; }
    .item { border-top:1px solid var(--line); padding:14px 0; }
    .item:first-child { border-top:none; }
    .weights { font-family: ui-monospace, monospace; font-size:12px; line-height:1.5; background:var(--cream); padding:10px; border-radius:10px; margin:8px 0; }
    .alias { display:inline-block; margin:2px 4px 2px 0; padding:2px 8px; border-radius:999px; background:rgba(230,57,70,.08); font-size:11px; }
    a.nav { color:#fff; font-size:13px; text-decoration:none; opacity:.9; }
  </style>
</head>
<body>
  <header>
    <h1>Peepal intent weights</h1>
    <div class="row" style="margin:0">
      <a class="nav" href="/admin/client-errors.html">Client errors</a>
      <a class="nav" href="/admin/feedback.html">Feedback</a>
      <button type="button" id="btnLogin" class="secondary" style="color:#fff;border-color:rgba(255,255,255,.3)">Sign in</button>
      <button type="button" id="btnRefresh">Refresh</button>
    </div>
  </header>
  <main>
    <div class="card">
      <p>Read-only list of <code>intentWeightProfiles</code>. Revert swaps current ↔ previousWeights. Requires Firebase claim <code>admin: true</code>.</p>
      <div id="authStatus" class="meta">Not signed in</div>
    </div>
    <div class="card">
      <strong>Profiles</strong>
      <div id="listBox" style="margin-top:10px"><em class="meta">Sign in as admin to load.</em></div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="/src/js/config/firebase.js"></script>
  <script>
    const statusEl = document.getElementById('authStatus');
    const listBox = document.getElementById('listBox');

    async function token() {
      const u = firebase.auth().currentUser;
      if (!u) return null;
      return u.getIdToken(true);
    }

    async function api(path, opts = {}) {
      const t = await token();
      if (!t) throw new Error('Sign in required');
      const res = await fetch(path, {
        method: opts.method || 'GET',
        headers: {
          Authorization: 'Bearer ' + t,
          ...(opts.body ? { 'Content-Type': 'application/json' } : {}),
        },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      const json = await res.json();
      if (!json.ok) {
        const err = new Error(json.error?.message || 'Request failed');
        err.code = json.error?.code;
        throw err;
      }
      return json.data;
    }

    function fmtWeights(w) {
      if (!w || typeof w !== 'object') return '—';
      return Object.entries(w)
        .map(([k, v]) => k + ': ' + (Math.round(Number(v) * 1000) / 1000))
        .join('\n');
    }

    async function load() {
      listBox.innerHTML = '<em class="meta">Loading…</em>';
      try {
        const data = await api('/api/admin-feedback?view=intent_weights');
        const items = data.items || [];
        if (!items.length) {
          listBox.innerHTML = '<em class="meta">No intent weight profiles yet.</em>';
          return;
        }
        listBox.innerHTML = items.map((it) => `
          <div class="item" data-id="${it.id}">
            <div><strong>${it.canonicalIntentText || '(untitled)'}</strong> · v${it.version || 1}</div>
            <div class="meta">usage ${it.usageCount || 0} · samples since refresh ${it.sampleCountSinceRefresh || 0} · ${it.id}</div>
            <div>${(it.aliasIntentTexts || []).map((a) => `<span class="alias">${a}</span>`).join('') || '<span class="meta">No aliases</span>'}</div>
            <div class="meta" style="margin-top:6px">${it.rationale || ''}</div>
            <pre class="weights">${fmtWeights(it.weights)}</pre>
            ${it.previousWeights ? `<button type="button" class="secondary" data-revert="${it.id}">Revert to previous weights</button>` : '<span class="meta">No previousWeights</span>'}
          </div>
        `).join('');
        listBox.querySelectorAll('[data-revert]').forEach((btn) => {
          btn.addEventListener('click', async () => {
            if (!confirm('Revert weights for this intent profile?')) return;
            try {
              await api('/api/admin-feedback', {
                method: 'POST',
                body: { action: 'revert_intent_weights', profileId: btn.dataset.revert },
              });
              await load();
            } catch (e) {
              alert(e.message || 'Revert failed');
            }
          });
        });
      } catch (e) {
        listBox.innerHTML = `<div class="err">${e.message || e}</div>`;
      }
    }

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      await firebase.auth().signInWithPopup(provider);
    });
    document.getElementById('btnRefresh').addEventListener('click', load);

    firebase.auth().onAuthStateChanged(async (u) => {
      if (!u) {
        statusEl.textContent = 'Not signed in';
        return;
      }
      const tokenResult = await u.getIdTokenResult(true);
      const isAdmin = tokenResult.claims.admin === true;
      statusEl.textContent = isAdmin
        ? `Signed in as ${u.email} (admin)`
        : `Signed in as ${u.email} — missing admin claim`;
      if (isAdmin) load();
    });
  </script>
</body>
</html>
