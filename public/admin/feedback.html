<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chaupaal · Feedback admin</title>
  <style>
    :root { --ink:#2B2730; --cream:#FFF8F0; --red:#E63946; --line:#E8DFD4; --muted:#7A7280; --navy:#1B1F3B; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, Segoe UI, sans-serif; background:var(--cream); color:var(--ink); }
    header { background:var(--navy); color:#fff; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    h1 { font-size:18px; margin:0; }
    main { max-width:960px; margin:0 auto; padding:20px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:16px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
    button, .btn { border:none; border-radius:10px; padding:10px 14px; font-weight:700; cursor:pointer; background:var(--red); color:#fff; }
    button.secondary { background:transparent; color:var(--ink); border:1px solid var(--line); }
    input { border:1px solid var(--line); border-radius:10px; padding:10px 12px; min-width:180px; }
    .tag { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; background:rgba(230,57,70,.1); color:var(--red); }
    .item { border-top:1px solid var(--line); padding:12px 0; }
    .item:first-child { border-top:none; }
    .meta { font-size:12px; color:var(--muted); margin-bottom:4px; }
    .err { color:var(--red); font-weight:600; }
    pre { white-space:pre-wrap; font-size:13px; line-height:1.45; }
  </style>
</head>
<body>
  <header>
    <h1>🏠 Chaupaal feedback</h1>
    <div class="row" style="margin:0">
      <a href="/admin/client-errors.html" style="color:#fff;font-size:13px;">Client errors</a>
      <button type="button" id="btnLogin" class="secondary" style="color:#fff;border-color:rgba(255,255,255,.3)">Sign in</button>
      <button type="button" id="btnRefresh">Refresh</button>
    </div>
  </header>
  <main>
    <div class="card" id="authCard">
      <p>Admin view — requires Firebase custom claim <code>admin: true</code>. Summaries are not shown in the user app.</p>
      <div id="authStatus" class="meta">Not signed in</div>
    </div>
    <div class="card">
      <div class="row">
        <strong>Daily summary</strong>
        <input type="date" id="summaryDate" />
        <button type="button" id="btnSummary" class="secondary">Load summary</button>
      </div>
      <div id="summaryBox"><em class="meta">Load a date to see the private daily aggregate.</em></div>
    </div>
    <div class="card">
      <strong>Chronological log</strong>
      <div id="logBox" style="margin-top:10px"><em class="meta">Sign in as admin to load.</em></div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="/src/js/config/firebase.js"></script>
  <script>
    const statusEl = document.getElementById('authStatus');
    const logBox = document.getElementById('logBox');
    const summaryBox = document.getElementById('summaryBox');
    const dateInput = document.getElementById('summaryDate');
    dateInput.value = new Date().toISOString().slice(0, 10);

    async function token() {
      const u = firebase.auth().currentUser;
      if (!u) return null;
      return u.getIdToken(true);
    }

    async function api(path) {
      const t = await token();
      if (!t) throw new Error('Sign in required');
      const res = await fetch(path, { headers: { Authorization: 'Bearer ' + t } });
      const json = await res.json();
      if (!json.ok) {
        const err = new Error(json.error?.message || 'Request failed');
        err.code = json.error?.code;
        throw err;
      }
      return json.data;
    }

    function renderLog(items) {
      if (!items?.length) {
        logBox.innerHTML = '<em class="meta">No feedback yet.</em>';
        return;
      }
      logBox.innerHTML = items.map(it => `
        <div class="item">
          <div class="meta"><span class="tag">${it.tag || 'other'}</span> · ${it.timestamp || ''} · ${it.userId || '?'}</div>
          <div>${(it.message || '').replace(/</g,'&lt;')}</div>
        </div>
      `).join('');
    }

    function renderSummary(data) {
      const cur = data.current;
      if (!cur) {
        summaryBox.innerHTML = `<em class="meta">No summary for ${data.date}. Recent:</em>
          <pre>${JSON.stringify(data.recent || [], null, 2)}</pre>`;
        return;
      }
      summaryBox.innerHTML = `
        <div class="meta">${cur.date || data.date} · ${cur.count || 0} items</div>
        <pre>${(cur.summary || '').replace(/</g,'&lt;')}</pre>
        <div class="meta">Tags: ${JSON.stringify(cur.tags || {})}</div>
      `;
    }

    async function refresh() {
      try {
        const data = await api('/api/admin-feedback?view=log&limit=80');
        renderLog(data.items || []);
      } catch (e) {
        logBox.innerHTML = `<div class="err">${e.message}${e.code ? ' ('+e.code+')' : ''}</div>`;
      }
    }

    async function loadSummary() {
      try {
        const d = dateInput.value || new Date().toISOString().slice(0, 10);
        const data = await api('/api/admin-feedback?view=summary&date=' + encodeURIComponent(d));
        renderSummary(data);
      } catch (e) {
        summaryBox.innerHTML = `<div class="err">${e.message}</div>`;
      }
    }

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      await firebase.auth().signInWithPopup(provider);
    });
    document.getElementById('btnRefresh').addEventListener('click', () => { refresh(); loadSummary(); });
    document.getElementById('btnSummary').addEventListener('click', loadSummary);

    firebase.auth().onAuthStateChanged(async (u) => {
      if (!u) {
        statusEl.textContent = 'Not signed in';
        return;
      }
      const t = await u.getIdTokenResult(true);
      const isAdmin = t.claims?.admin === true;
      statusEl.textContent = isAdmin
        ? `Signed in as ${u.email || u.uid} (admin)`
        : `Signed in as ${u.email || u.uid} — missing admin claim`;
      if (isAdmin) {
        refresh();
        loadSummary();
      }
    });
  </script>
</body>
</html>
